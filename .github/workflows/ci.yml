name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Package checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run CI checks
        run: make ci

