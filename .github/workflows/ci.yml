name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # POSIX runners: Ubuntu + macOS. GNU make is available, so `make ci` runs
  # the full chain (compile, lint, unit tests, e2e, check-ai, build).
  posix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint + type-check
        run: make lint-ci

      - name: Compile
        run: make compile

      - name: Unit tests
        run: make test

      - name: Integration tests
        run: make test-integration

      - name: Build wheel
        run: make build

  # Windows runner: GNU make isn't standard on windows-latest. Invoke each
  # check directly via uv so the workflow stays portable.
  windows:
    name: windows-latest
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint + type-check
        run: |
          uv run ruff format --check src tests tests_integration scripts
          uv run ruff check src tests tests_integration scripts
          uv run mypy src tests tests_integration scripts

      - name: Unit tests
        run: uv run python -m unittest discover -s tests -t .

      - name: Integration tests
        run: uv run python -m unittest discover -s tests_integration -t .

      - name: Build wheel
        run: uv build

  # Drift guard: fail if uv.lock is out of sync with pyproject.toml.
  # Runs on one platform only — the lockfile is platform-independent.
  lock-check:
    name: uv.lock drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Verify lockfile is in sync with pyproject.toml
        run: uv lock --check

  # Drift guard: regenerates the bundled AI workbench files from the pinned
  # WORKBENCH_REF and fails if the result doesn't match what's committed.
  # Runs on one platform only — the output is platform-independent and we
  # don't need to triple the CI time.
  check-ai:
    name: AI workbench drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Regenerate + diff
        run: make check-ai
